name: Update Sheet Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-sheet-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update sheet data
        run: python scripts/update_sheet_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet data/sheet-data.json; then
            echo "No changes to commit"
          else
            git add data/sheet-data.json
            git commit -m "Update sheet data"
            git push
          fi
